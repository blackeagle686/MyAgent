
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Graduation Projects Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    body {
      background-color: #f8f9fa;
      font-family: "Segoe UI", sans-serif;
    }
    .dashboard-header {
      background: linear-gradient(90deg, #0C0C0C, #9B3922, #F2613F);
      color: white;
      padding: 2rem;
      border-radius: 1rem;
      margin-bottom: 2rem;
      text-align: center;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
    }
    .table-container {
      background: white;
      border-radius: 1rem;
      padding: 1rem;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }
    table {
      border-radius: 1rem;
      overflow: hidden;
    }
    th {
      background-color: #481E14;
      color: white;
      text-align: center;
    }
    td {
      text-align: center;
      vertical-align: middle;
    }
    .search-box {
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>

  <div class="container-fluid">
    <!-- Header -->
    <div class="dashboard-header">
      <h1 class="fw-bold">🎓 Graduation Projects Dashboard</h1>
      <p class="mb-0">Fayoum University 2024</p>
    </div>

    <!-- Search -->
    <div class="row mb-3">
      <div class="col-md-6 mx-auto">
        <input type="text" id="searchInput" class="form-control search-box" placeholder="🔍 Search projects...">
      </div>
    </div>

    <!-- Data Table -->
    <div class="table-container">
      <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                {% for col in columns %}
                <th>{{ col }}</th>
                {% endfor %}
            </tr>
            </thead>
            <tbody id="dataTable">
            {% for row in data %}
                <tr>
                {% for cell in row %}
                    <td>{{ cell }}</td>
                {% endfor %}
                </tr>
            {% endfor %}
            </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Search Script -->
  <script>
    document.getElementById("searchInput").addEventListener("keyup", function() {
      let filter = this.value.toLowerCase();
      let rows = document.querySelectorAll("#dataTable tr");
      rows.forEach(row => {
        row.style.display = row.innerText.toLowerCase().includes(filter) ? "" : "none";
      });
    });
  </script>
</body>
</html>
